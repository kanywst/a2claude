name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build
        run: uv build

      - name: Upload dist
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub release
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true

  publish:
    needs: build
    runs-on: ubuntu-latest
    # PyPI Trusted Publishing: configure this repo + workflow + environment
    # as a publisher on PyPI once, then no token is needed.
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Download dist
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        run: uv publish
